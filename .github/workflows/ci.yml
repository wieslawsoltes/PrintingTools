name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  native-build-macos:
    name: Native Build (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore macOS project
        run: dotnet restore src/PrintingTools.MacOS/PrintingTools.MacOS.csproj

      - name: Build macOS project
        run: dotnet build src/PrintingTools.MacOS/PrintingTools.MacOS.csproj -c Release --no-restore

      - name: Verify native bridge
        run: |
          test -f src/PrintingTools.MacOS/native/OSX/PrintingToolsMacBridge.dylib
          file src/PrintingTools.MacOS/native/OSX/PrintingToolsMacBridge.dylib
          lipo -info src/PrintingTools.MacOS/native/OSX/PrintingToolsMacBridge.dylib

      - name: Upload native bridge
        uses: actions/upload-artifact@v4
        with:
          name: native-macos
          path: src/PrintingTools.MacOS/native/OSX/PrintingToolsMacBridge.dylib
          retention-days: 7

  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore solution
        run: dotnet restore PrintingTool.sln

      - name: Build solution
        run: dotnet build PrintingTool.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test tests/PrintingTools.Tests/PrintingTools.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/
          retention-days: 7

  harness-linux:
    name: Harness (Linux)
    runs-on: ubuntu-latest
    needs: build
    env:
      GTK_USE_PORTAL: "1"
      GIO_USE_PORTALS: "1"
      HARNESS_METRICS_PATH: artifacts/linux/metrics.json
      HARNESS_PLATFORM: Linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cups-client libcups2 libgtk-3-0

      - name: Restore solution
        run: dotnet restore PrintingTool.sln

      - name: Run Linux sandbox harness
        run: |
          mkdir -p artifacts/linux
          dotnet run -c Release --project samples/LinuxSandboxHarness/LinuxSandboxHarness.csproj -- --print --output=artifacts/linux/printingtools-linux.pdf --metrics="$HARNESS_METRICS_PATH" --stress=3 | tee artifacts/linux/linux-harness.log

      - name: Validate harness metrics
        run: dotnet test tests/PrintingTools.Tests/PrintingTools.Tests.csproj -c Release --filter "FullyQualifiedName~HarnessMetricsThresholdTests"

      - name: Upload Linux harness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-harness
          path: artifacts/linux
          retention-days: 7

  harness-macos:
    name: Harness (macOS)
    runs-on: macos-latest
    needs: build
    env:
      PRINTINGTOOLS_MAC_HEADLESS: "1"
      HARNESS_METRICS_PATH: artifacts/macos/metrics.json
      HARNESS_PLATFORM: macOS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore solution
        run: dotnet restore PrintingTool.sln

      - name: Run macOS sandbox harness
        run: |
          mkdir -p artifacts/macos
          dotnet run -c Release --project samples/MacSandboxHarness/MacSandboxHarness.csproj -- --headless --output=artifacts/macos/printingtools-macos.pdf --metrics="$HARNESS_METRICS_PATH" --stress=3 | tee artifacts/macos/macos-harness.log

      - name: Validate harness metrics
        run: dotnet test tests/PrintingTools.Tests/PrintingTools.Tests.csproj -c Release --filter "FullyQualifiedName~HarnessMetricsThresholdTests"

      - name: Upload macOS harness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-harness
          path: artifacts/macos
          retention-days: 7

  harness-windows:
    name: Harness (Windows)
    runs-on: windows-latest
    needs: build
    env:
      HARNESS_METRICS_PATH: artifacts/windows/metrics.json
      HARNESS_PLATFORM: Windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore solution
        run: dotnet restore PrintingTool.sln

      - name: Run Windows print harness
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows | Out-Null
          dotnet run -c Release --project samples/WindowsPrintHarness/WindowsPrintHarness.csproj -- --output=artifacts/windows/printingtools-windows.pdf --metrics=$env:HARNESS_METRICS_PATH --stress=3 | Tee-Object -FilePath artifacts/windows/windows-harness.log

      - name: Validate harness metrics
        shell: pwsh
        run: dotnet test tests/PrintingTools.Tests/PrintingTools.Tests.csproj -c Release --filter "FullyQualifiedName~HarnessMetricsThresholdTests"

      - name: Upload Windows harness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-harness
          path: artifacts/windows
          retention-days: 7

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: [native-build-macos, build, harness-linux, harness-macos, harness-windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS native bridge
        uses: actions/download-artifact@v4
        with:
          name: native-macos
          path: native-artifacts/macos

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install macOS native bridge
        run: |
          mkdir -p src/PrintingTools.MacOS/native/OSX
          cp native-artifacts/macos/PrintingToolsMacBridge.dylib src/PrintingTools.MacOS/native/OSX/PrintingToolsMacBridge.dylib

      - name: Restore solution
        run: dotnet restore PrintingTool.sln

      - name: Pack solution
        run: dotnet pack PrintingTool.sln -c Release --no-restore -o artifacts/packages -p:ContinuousIntegrationBuild=true

      - name: Verify packages
        run: |
          set -euo pipefail
          expected=(
            "PrintingTools"
            "PrintingTools.Core"
            "PrintingTools.Linux"
            "PrintingTools.MacOS"
            "PrintingTools.UI"
            "PrintingTools.Windows"
          )

          for package in "${expected[@]}"; do
            ls artifacts/packages/${package}.*.nupkg >/dev/null 2>&1
            ls artifacts/packages/${package}.*.snupkg >/dev/null 2>&1
          done

          unzip -l artifacts/packages/PrintingTools.MacOS.*.nupkg | grep -F "runtimes/osx/native/PrintingToolsMacBridge.dylib"

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/packages
          retention-days: 7
